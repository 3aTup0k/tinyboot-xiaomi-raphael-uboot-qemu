name: Build Alpine RAM Rootfs

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version (e.g. 7.0)'
        required: true
        default: '7.0'
      alpine_version:
        description: 'Alpine branch (e.g. latest-stable, v3.21)'
        required: true
        default: 'latest-stable'
      build_qemu_ios:
        description: 'Build qemu-ios (iPod Touch 2G emulator)'
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - 'build.sh'
      - 'build-qemu-ios.sh'
      - 'initramfs/**'
      - 'overlays/**'
      - '.github/workflows/*.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Alpine RAM Rootfs
    runs-on: ubuntu-latest
    outputs:
      kernel_version: ${{ steps.build.outputs.kernel_version }}
      alpine_version: ${{ steps.build.outputs.alpine_version }}
      has_qemu_ios: ${{ steps.build.outputs.has_qemu_ios }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            squashfs-tools dosfstools mtools
        continue-on-error: true

      - name: Setup QEMU binfmt (for qemu-ios cross-build)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_qemu_ios == 'true' }}
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Run build script
        id: build
        run: |
          sudo bash build.sh 2>&1
        env:
          KERNEL_VERSION: ${{ github.event.inputs.kernel_version || '7.0' }}
          ALPINE_VERSION: ${{ github.event.inputs.alpine_version || 'latest-stable' }}
          BUILD_QEMU_IOS: ${{ github.event.inputs.build_qemu_ios || 'false' }}

      - name: List output files
        run: |
          echo "## Output files" >> $GITHUB_STEP_SUMMARY
          ls -lhR output/ >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpine-ram-raphael-${{ github.event.inputs.kernel_version || '7.0' }}
          path: output/
          compression-level: 0
          retention-days: 7

  release:
    name: Create Release
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Generate release info
        id: meta
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version || '7.0' }}"
          TIMESTAMP=$(date -u +'%Y%m%d-%H%M%S')
          echo "tag=alpine-ram-v${KERNEL_VER}-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "name=Alpine RAM Rootfs v${KERNEL_VER} (${TIMESTAMP})" >> $GITHUB_OUTPUT

          # Calculate checksums
          cd _artifacts
          find . -type f -exec sha256sum {} \; > ../checksums.txt
          cd ..
          echo "checksums<<EOF" >> $GITHUB_OUTPUT
          cat checksums.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            ## Alpine RAM Rootfs for Xiaomi Raphael

            **Kernel:** v${{ github.event.inputs.kernel_version || '7.0' }}
            **Alpine:** ${{ github.event.inputs.alpine_version || 'latest-stable' }}
            **qemu-ios:** ${{ github.event.inputs.build_qemu_ios || 'false' }}

            ### Artifacts

            - `linux.efi` — Kernel image
            - `initramfs` — Initramfs (Alpine rootfs + squashfs)
            - `dtbs/` — Device tree blobs
            - `boot.img` — FAT32 partition image (kernel + initramfs + dtbs)
            ${{ github.event.inputs.build_qemu_ios == 'true' && '- `qemu-system-arm` — qemu-ios binary (iPod Touch 2G)' || '' }}

            ### SHA256 Checksums

            ```
            ${{ steps.meta.outputs.checksums }}
            ```

            ### Flashing

            ```bash
            fastboot flash boot u-boot.img
            fastboot flash cache boot.img
            fastboot reboot
            ```
          files: |
            _artifacts/**/*
          draft: true
          prerelease: false
